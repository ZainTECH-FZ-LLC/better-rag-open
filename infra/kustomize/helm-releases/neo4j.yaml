apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: neo4j
  namespace: better-rag
spec:
  interval: 30m
  chart:
    spec:
      chart: neo4j
      version: "5.20.*"
      sourceRef:
        kind: HelmRepository
        name: neo4j
        namespace: flux-system
  values:
    neo4j:
      name: "better-rag-neo4j"
      edition: "community"
      password: ""  # Loaded from secret via extraEnvFrom
      minimumClusterSize: 1

    volumes:
      data:
        mode: "volume"
        volume:
          storageClassName: "managed-premium"
          accessModes:
            - ReadWriteOnce
          requests:
            storage: 100Gi

    nodeSelector:
      workload: data

    tolerations:
      - key: "workload"
        operator: "Equal"
        value: "data"
        effect: "NoSchedule"

    resources:
      requests:
        cpu: 1000m
        memory: 4Gi
      limits:
        cpu: 4000m
        memory: 8Gi

    config:
      server.memory.heap.initial_size: "2G"
      server.memory.heap.max_size: "4G"
      server.memory.pagecache.size: "2G"
      dbms.security.auth_enabled: "true"
      server.bolt.listen_address: "0.0.0.0:7687"
      server.http.listen_address: "0.0.0.0:7474"

    services:
      neo4j:
        enabled: true
        spec:
          type: ClusterIP

    extraEnvFrom:
      - secretRef:
          name: neo4j-credentials

    jvmAdditionalSettings:
      - "-XX:+UseG1GC"
      - "-XX:+DisableExplicitGC"
