apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: open-webui
  namespace: better-rag
spec:
  interval: 30m
  chart:
    spec:
      chart: open-webui
      version: "3.*"
      sourceRef:
        kind: HelmRepository
        name: open-webui
        namespace: flux-system
  values:
    replicaCount: 2
    nodeSelector:
      workload: app

    image:
      repository: ghcr.io/open-webui/open-webui
      tag: latest
      pullPolicy: IfNotPresent

    service:
      type: ClusterIP
      port: 8080

    ingress:
      enabled: false  # Managed by better-rag ingress.yaml

    persistence:
      enabled: true
      storageClass: "managed-premium"
      size: 10Gi

    env:
      - name: WEBUI_NAME
        value: "BetterRAG"
      - name: WEBUI_URL
        value: "https://rag.contoso.com"
      - name: ENABLE_SIGNUP
        value: "false"
      - name: DEFAULT_MODELS
        value: ""
      - name: OPENAI_API_BASE_URL
        value: "http://better-rag-api:8000/api/v1/openai"
      - name: OPENAI_API_KEY
        valueFrom:
          secretKeyRef:
            name: better-rag-secrets
            key: openai-compat-key
      - name: WEBUI_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: better-rag-secrets
            key: webui-secret-key

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
