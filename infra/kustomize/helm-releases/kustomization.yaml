apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Helm releases managed by FluxCD.
# Apply with: flux reconcile kustomization helm-releases
# Or directly: kubectl apply -k infra/kustomize/helm-releases/

resources:
  - nginx-ingress.yaml
  - cert-manager.yaml
  - keda.yaml
  - open-webui.yaml
  - neo4j.yaml
