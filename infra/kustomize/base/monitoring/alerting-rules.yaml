apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: better-rag-alerts
  namespace: better-rag
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: better-rag.query
      interval: 60s
      rules:
        - alert: HighQueryLatencyP95
          expr: |
            histogram_quantile(0.95, sum(rate(rag_query_duration_seconds_bucket[5m])) by (le)) > 8
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "RAG query p95 latency above 8s"
            description: "p95 query latency is {{ $value | humanizeDuration }} — SLA target is 8s."

        - alert: HighQueryLatencyP99
          expr: |
            histogram_quantile(0.99, sum(rate(rag_query_duration_seconds_bucket[5m])) by (le)) > 15
          for: 5m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "RAG query p99 latency above 15s"
            description: "p99 query latency is {{ $value | humanizeDuration }}."

        - alert: LowRetrievalSufficiency
          expr: |
            (sum(rate(rag_retrieval_sufficient_total[10m])) / sum(rate(rag_retrieval_total[10m]))) < 0.7
          for: 10m
          labels:
            severity: warning
            team: ml
          annotations:
            summary: "Retrieval sufficiency below 70%"
            description: "Only {{ $value | humanizePercentage }} of retrievals are sufficient. Knowledge base may need reindexing."

    - name: better-rag.workers
      interval: 60s
      rules:
        - alert: CeleryQueueDepthHigh
          expr: |
            celery_queue_length{queue="rag.query"} > 100
          for: 3m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Celery rag.query queue depth above 100"
            description: "Query queue has {{ $value }} pending tasks."

        - alert: CeleryWorkerDown
          expr: |
            up{job="celery-exporter"} == 0
          for: 2m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Celery worker exporter unreachable"
            description: "The Celery metrics exporter has been down for 2+ minutes."

    - name: better-rag.infrastructure
      interval: 30s
      rules:
        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="better-rag"}[15m]) > 0
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"
            description: "Container {{ $labels.container }} restarted {{ $value | humanize }} times in 15m."

        - alert: PodOOMKilled
          expr: |
            kube_pod_container_status_last_terminated_reason{namespace="better-rag", reason="OOMKilled"} == 1
          for: 0m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Pod {{ $labels.pod }} was OOMKilled"
            description: "Container {{ $labels.container }} was killed due to out-of-memory."

        - alert: PostgresConnectionsHigh
          expr: |
            pg_stat_activity_count > 350
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "PostgreSQL connection count above 350"
            description: "{{ $value }} connections active. Connection pool may need tuning."
