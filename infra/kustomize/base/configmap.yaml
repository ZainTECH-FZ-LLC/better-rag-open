apiVersion: v1
kind: ConfigMap
metadata:
  name: better-rag-config
  namespace: better-rag
data:
  APP_NAME: "better-rag"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  LLM_PROVIDER: "azure_openai"
  LLM_EXPENSIVE_MODEL: "gpt-4o"
  LLM_CHEAP_MODEL: "gpt-4o-mini"
  EMBEDDING_AZURE_DEPLOYMENT: "text-embedding-3-large"
  EMBEDDING_DIMENSIONS: "1536"
  EMBEDDING_BATCH_SIZE: "16"
  PGVECTOR_HOST: "${PG_HOST}"
  PGVECTOR_PORT: "5432"
  PGVECTOR_DATABASE: "betterrag"
  PGVECTOR_USER: "pgadmin"
  NEO4J_URI: "bolt://neo4j.better-rag.svc.cluster.local:7687"
  NEO4J_USER: "neo4j"
  REDIS_HOST: "${REDIS_HOST}"
  REDIS_PORT: "6380"
  REDIS_SSL: "true"
  BLOB_ACCOUNT_URL: "${BLOB_ACCOUNT_URL}"
  BLOB_CONTAINER_NAME: "documents"
  OCR_PROVIDER: "azure_di"
  OCR_AZURE_ENDPOINT: "${OCR_AZURE_ENDPOINT}"
  AZURE_OPENAI_ENDPOINT: "${AZURE_OPENAI_ENDPOINT}"
  EMBEDDING_AZURE_ENDPOINT: "${AZURE_OPENAI_ENDPOINT}"
  DELTA_SYNC_INTERVAL_MINUTES: "15"
  CHUNK_TARGET_TOKENS: "450"
  CHUNK_MAX_TOKENS: "600"
  PUBLIC_BASE_URL: "https://${DOMAIN_NAME}"
