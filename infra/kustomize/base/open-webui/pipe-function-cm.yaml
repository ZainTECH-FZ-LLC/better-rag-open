apiVersion: v1
kind: ConfigMap
metadata:
  name: better-rag-pipe-function
  namespace: better-rag
  labels:
    app: better-rag
    component: open-webui
data:
  pipe_function.py: |
    """
    BetterRAG Open WebUI Pipe Function.

    Forwards chat requests to the BetterRAG API, streams SSE responses back to
    Open WebUI, and emits citation pills using __event_emitter__.

    Register via: Open WebUI → Admin → Functions → + (paste this file)
    """

    from typing import Optional, Generator, Iterator
    import json
    import os
    import httpx

    from pydantic import BaseModel


    class Pipe:
        class Valves(BaseModel):
            api_base_url: str = "http://api:8000"
            api_key: str = ""
            stream_timeout: int = 120
            show_citations: bool = True

        def __init__(self):
            self.valves = self.Valves(
                api_base_url=os.getenv("BETTER_RAG_API_URL", "http://api:8000"),
                api_key=os.getenv("BETTER_RAG_API_KEY", ""),
            )
            self.type = "pipe"
            self.name = "BetterRAG"

        def pipes(self):
            return [{"id": "better-rag", "name": "BetterRAG Enterprise RAG"}]

        def pipe(
            self,
            body: dict,
            __user__: Optional[dict] = None,
            __event_emitter__=None,
        ) -> Iterator[str]:
            """
            Process a chat completion request through BetterRAG.

            Streams the response token-by-token and emits citations as
            Open WebUI status events when the stream completes.
            """
            messages = body.get("messages", [])
            if not messages:
                yield "No messages provided."
                return

            # Extract last user message as the query
            query = ""
            for msg in reversed(messages):
                if msg.get("role") == "user":
                    query = msg.get("content", "")
                    break

            if not query:
                yield "No user message found."
                return

            user_id = (__user__ or {}).get("id", "anonymous")
            headers = {
                "Content-Type": "application/json",
                "Accept": "text/event-stream",
                "X-User-ID": user_id,
            }
            if self.valves.api_key:
                headers["Authorization"] = f"Bearer {self.valves.api_key}"

            payload = {
                "query": query,
                "stream": True,
                "user_id": user_id,
            }

            citations = []
            documents = []
            full_answer = ""

            try:
                with httpx.Client(timeout=self.valves.stream_timeout) as client:
                    with client.stream(
                        "POST",
                        f"{self.valves.api_base_url}/api/v1/query",
                        json=payload,
                        headers=headers,
                    ) as response:
                        response.raise_for_status()

                        for line in response.iter_lines():
                            if not line or not line.startswith("data:"):
                                continue

                            data_str = line[5:].strip()
                            if data_str == "[DONE]":
                                break

                            try:
                                event = json.loads(data_str)
                            except json.JSONDecodeError:
                                continue

                            event_type = event.get("type", "token")

                            if event_type == "token":
                                chunk = event.get("content", "")
                                full_answer += chunk
                                yield chunk

                            elif event_type == "citations":
                                citations = event.get("citations", [])

                            elif event_type == "documents":
                                documents = event.get("documents", [])

                            elif event_type == "error":
                                error_msg = event.get("message", "Unknown error")
                                yield f"\n\n⚠️ Error: {error_msg}"
                                return

            except httpx.TimeoutException:
                yield "\n\n⚠️ Request timed out. The query may be too complex — try a more specific question."
                return
            except httpx.HTTPStatusError as e:
                yield f"\n\n⚠️ API error: {e.response.status_code}"
                return
            except Exception as e:
                yield f"\n\n⚠️ Unexpected error: {str(e)}"
                return

            # Emit citations as Open WebUI status events
            if __event_emitter__ and self.valves.show_citations and citations:
                for cite in citations:
                    __event_emitter__(
                        {
                            "type": "citation",
                            "data": {
                                "document": [cite.get("content", "")],
                                "metadata": [
                                    {
                                        "source": cite.get("sharepoint_url", cite.get("title", "")),
                                        "title": cite.get("title", ""),
                                        "date": cite.get("date", ""),
                                        "score": cite.get("score", 0),
                                    }
                                ],
                                "source": {
                                    "name": cite.get("title", ""),
                                    "url": cite.get("sharepoint_url", ""),
                                },
                            },
                        }
                    )

            # Emit generated documents as file attachments
            if __event_emitter__ and documents:
                for doc in documents:
                    __event_emitter__(
                        {
                            "type": "status",
                            "data": {
                                "description": f"📎 Generated: [{doc['filename']}]({doc['download_url']})",
                                "done": True,
                            },
                        }
                    )
