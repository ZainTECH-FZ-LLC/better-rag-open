apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: better-rag

resources:
  - ../../base
  # PodDisruptionBudgets — only enforced in prod
  - patches/pdb.yaml

patches:
  # Spread API pods across nodes for HA
  - path: patches/node-affinity.yaml
    target:
      kind: Deployment
      name: api

  # Production logging: INFO level, no debug
  - target:
      kind: ConfigMap
      name: better-rag-config
    patch: |
      - op: replace
        path: /data/DEBUG
        value: "false"
      - op: replace
        path: /data/LOG_LEVEL
        value: "INFO"

images:
  - name: IMAGE_PLACEHOLDER
    newName: betterragacr.azurecr.io/better-rag-api
    newTag: latest
  - name: DOCGEN_IMAGE_PLACEHOLDER
    newName: betterragacr.azurecr.io/better-rag-docgen
    newTag: latest
